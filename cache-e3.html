<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Cache Allumage €3</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

header{
background:black;
padding:20px;
font-size:24px;
}

#viewer3d{
width:100%;
height:500px;
margin-top:30px;
}

.colorButtons{
margin-top:20px;
}

.colorButtons button{
margin:5px;
padding:10px 20px;
border:none;
cursor:pointer;
font-weight:bold;
}

</style>

</head>

<body>

<header>
<a href="index.html" style="color:white;text-decoration:none;">
Accueil
</a>
</header>

<h1>Cache allumage €3</h1>

<div id="viewer3d"></div>

<div class="colorButtons">

<h3>Couleur base</h3>

<button onclick="changeColor('base','#ffffff')">Blanc</button>
<button onclick="changeColor('base','#ff0000')">Rouge</button>
<button onclick="changeColor('base','#0066ff')">Bleu</button>
<button onclick="changeColor('base','#000000')">Noir</button>

<h3>Couleur rond</h3>

<button onclick="changeColor('rond','#ffffff')">Blanc</button>
<button onclick="changeColor('rond','#ff0000')">Rouge</button>
<button onclick="changeColor('rond','#0066ff')">Bleu</button>
<button onclick="changeColor('rond','#000000')">Noir</button>

</div>

<button style="margin-top:30px;padding:15px 30px;">
Ajouter au panier
</button>


<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>

<script>

let scene = new THREE.Scene()

scene.background = new THREE.Color(0x111111)

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth / 500,
0.1,
1000
)

camera.position.set(0,80,150)

let renderer = new THREE.WebGLRenderer({antialias:true})

renderer.setSize(window.innerWidth,500)

document.getElementById("viewer3d").appendChild(renderer.domElement)

let controls = new THREE.OrbitControls(camera,renderer.domElement)

controls.enableDamping = true


const light1 = new THREE.DirectionalLight(0xffffff,1)

light1.position.set(100,100,100)

scene.add(light1)

scene.add(new THREE.AmbientLight(0xffffff,0.7))


let parts = {}


let loader = new THREE.GLTFLoader()

loader.load("models/cache_e3.glb",function(gltf){

let model = gltf.scene

scene.add(model)

model.traverse(function(child){

if(child.isMesh){

parts[child.name] = child

}

})

})


function changeColor(part,color){

if(parts[part]){

parts[part].material.color.set(color)

}

}


function animate(){

requestAnimationFrame(animate)

controls.update()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>

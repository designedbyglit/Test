<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Configurateur</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/STLLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<style>

body{
margin:0;
background:#0a0a0a;
color:white;
font-family:Arial;
}

header{
display:flex;
justify-content:space-between;
padding:20px;
background:#000;
}

header a{
color:white;
text-decoration:none;
}

#viewer{
width:500px;
height:500px;
margin:auto;
}

button{
background:#a100ff;
border:none;
padding:10px 20px;
color:white;
margin:5px;
cursor:pointer;
}

.colors{
display:flex;
justify-content:center;
gap:10px;
margin-top:20px;
}

.color{
width:30px;
height:30px;
border-radius:50%;
cursor:pointer;
border:2px solid white;
}

</style>

</head>

<body>

<header>

<a href="index.html">Accueil</a>

<div>Configurateur</div>

<a href="panier.html">Panier</a>

</header>

<h2 style="text-align:center" id="title"></h2>

<div style="text-align:center">

<button onclick="loadMotor('am6')">AM6</button>
<button onclick="loadMotor('e3')">E3</button>

</div>

<div id="viewer"></div>

<h3 style="text-align:center">Couleur</h3>

<div class="colors">

<div class="color" style="background:black" onclick="setColor('#111')"></div>
<div class="color" style="background:red" onclick="setColor('#ff0000')"></div>
<div class="color" style="background:blue" onclick="setColor('#0066ff')"></div>
<div class="color" style="background:purple" onclick="setColor('#a100ff')"></div>

</div>

<div style="text-align:center">
<button onclick="addToCart()">Ajouter au panier</button>
</div>

<script>

const params = new URLSearchParams(window.location.search)
const product = params.get("piece")

document.getElementById("title").innerText = product

const pieces={

recuperateur:{
am6:["models/recup_am6_base.stl","models/recup_am6_bouchon.stl"],
e3:["models/recup_e3_base.stl","models/recup_e3_bouchon.stl"]
},

support_durite:{
am6:["models/support_am6.stl"],
e3:["models/support_e3.stl"]
},

cache_pignon:{
am6:["models/pignon_am6_base.stl","models/pignon_am6_pieces1.stl"],
e3:["models/pignon_e3_base.stl","models/pignon_e3_pieces1.stl"]
}

}

let scene=new THREE.Scene()

let camera=new THREE.PerspectiveCamera(75,1,0.1,1000)

let renderer=new THREE.WebGLRenderer({alpha:true})

renderer.setSize(500,500)

document.getElementById("viewer").appendChild(renderer.domElement)

let light=new THREE.DirectionalLight(0xffffff,1)

light.position.set(0,0,10)

scene.add(light)

let material=new THREE.MeshStandardMaterial({color:0xa100ff})

let loader=new THREE.STLLoader()

let meshes=[]

function clearScene(){

meshes.forEach(m=>scene.remove(m))
meshes=[]

}

function loadMotor(type){

clearScene()

if(!pieces[product])return
if(!pieces[product][type])return

pieces[product][type].forEach(file=>{

loader.load(file,function(geometry){

let mesh=new THREE.Mesh(geometry,material)

geometry.center()

scene.add(mesh)

meshes.push(mesh)

})

})

}

camera.position.z=120

let controls=new THREE.OrbitControls(camera,renderer.domElement)

function animate(){

requestAnimationFrame(animate)

renderer.render(scene,camera)

}

animate()

function setColor(c){

material.color.set(c)

}

function addToCart(){

let cart=JSON.parse(localStorage.getItem("cart"))||[]

cart.push({name:product})

localStorage.setItem("cart",JSON.stringify(cart))

alert("Ajouté au panier")

}

loadMotor("am6")

</script>

</body>
</html>

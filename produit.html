<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Personnaliser</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<a href="index.html">Accueil</a>

<div class="logo">
<img src="images/logo.png">
</div>

<a href="panier.html">Panier</a>

</header>

<section class="products">

<h1>Personnalisation</h1>

<br>

<div style="max-width:500px;margin:auto">

<img id="preview" src="images/cache_allumage.jpg" style="width:100%;border-radius:20px">

<br><br>

<label>Couleur :</label>

<input type="color" id="colorPicker" value="#a100ff">

<br><br>

<button onclick="addToCart()">Ajouter au panier</button>

</div>

</section>

<script>

const preview = document.getElementById("preview")
const colorPicker = document.getElementById("colorPicker")

colorPicker.addEventListener("input",()=>{

preview.style.filter="drop-shadow(0 0 20px "+colorPicker.value+")"

})


function addToCart(){

let cart = JSON.parse(localStorage.getItem("cart")) || []

cart.push({

name:"Pièce personnalisée",
price:30,
color:colorPicker.value,
qty:1

})

localStorage.setItem("cart",JSON.stringify(cart))

alert("Produit ajouté au panier")

}

</script>

</body>

</html>

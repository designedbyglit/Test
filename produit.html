<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Personnaliser pièce</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/STLLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

</head>

<body>

<header>

<a href="index.html">Accueil</a>

<div class="logo">
<img src="images/logo.png">
</div>

<a href="panier.html">Panier</a>

</header>


<section class="products">

<h1 id="title"></h1>

<div id="viewer" style="width:500px;height:500px;margin:auto"></div>

<br>

<label>Couleur :</label>

<input type="color" id="colorPicker" value="#a100ff">

<br><br>

<button onclick="addToCart()">Ajouter au panier</button>

</section>


<script>

/* récupérer le produit dans l'URL */

const params = new URLSearchParams(window.location.search)
const product = params.get("name")

document.getElementById("title").innerText = product


/* correspondance STL */

const models = {

cache_allumage:"models/cache_allumage.stl",
cache_pignon:"models/cache_pignon.stl",
support_durite:"models/support_durite.stl",
butee_biellette:"models/butee_biellette.stl",
cache_obturateur:"models/cache_obturateur.stl",
recuperateur:"models/recuperateur.stl",
pipe:"models/pipe.stl",
radia_derbi:"models/radia_derbi.stl"

}


/* THREE JS */

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
75,
500/500,
0.1,
1000
)

let renderer = new THREE.WebGLRenderer({alpha:true})

renderer.setSize(500,500)

document.getElementById("viewer").appendChild(renderer.domElement)

let light = new THREE.DirectionalLight(0xffffff,1)

light.position.set(0,0,10)

scene.add(light)

let material = new THREE.MeshStandardMaterial({
color:0xa100ff,
metalness:0.7,
roughness:0.2
})

let loader = new THREE.STLLoader()

let mesh

loader.load(models[product],function(geometry){

mesh = new THREE.Mesh(geometry,material)

geometry.center()

scene.add(mesh)

})

camera.position.z = 100

let controls = new THREE.OrbitControls(camera,renderer.domElement)


function animate(){

requestAnimationFrame(animate)

renderer.render(scene,camera)

}

animate()


/* changer couleur */

document.getElementById("colorPicker").addEventListener("input",e=>{

material.color.set(e.target.value)

})


/* panier */

function addToCart(){

let cart = JSON.parse(localStorage.getItem("cart")) || []

cart.push({

name:product,
price:30,
color:document.getElementById("colorPicker").value,
qty:1

})

localStorage.setItem("cart",JSON.stringify(cart))

alert("Ajouté au panier")

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Configurateur pièce</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/STLLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<style>

#viewer{
width:500px;
height:500px;
margin:auto;
}

.colors{
display:flex;
gap:10px;
justify-content:center;
margin-top:20px;
}

.color{
width:30px;
height:30px;
border-radius:50%;
cursor:pointer;
border:2px solid white;
}

</style>

</head>

<body>

<h1 id="title" style="text-align:center"></h1>

<div style="text-align:center">

<button onclick="loadMotor('am6')">AM6</button>
<button onclick="loadMotor('e3')">E3</button>

</div>

<br>

<div id="viewer"></div>

<h3 style="text-align:center">Couleur</h3>

<div class="colors">

<div class="color" style="background:black" onclick="setColor('#111')"></div>
<div class="color" style="background:red" onclick="setColor('#ff0000')"></div>
<div class="color" style="background:blue" onclick="setColor('#0066ff')"></div>
<div class="color" style="background:purple" onclick="setColor('#a100ff')"></div>

</div>

<br>

<div style="text-align:center">

<button onclick="addToCart()">Ajouter au panier</button>

</div>

<script>

/* récupérer pièce */

const params = new URLSearchParams(window.location.search)
const product = params.get("piece")

document.getElementById("title").innerText = product


/* fichiers STL */

const pieces = {

recuperateur:{

e3:[
"models/recup_e3_base.stl",
"models/recup_e3_bouchon.stl"
],

am6:[
"models/recup_am6_base.stl",
"models/recup_am6_bouchon.stl"
]

},

support_durite:{

e3:["models/support_e3.stl"],
am6:["models/support_am6.stl"]

},

cache_pignon:{

e3:[
"models/pignon_e3_base.stl",
"models/pignon_e3_pieces1.stl"
],

am6:[
"models/pignon_am6_base.stl",
"models/pignon_am6_pieces1.stl"
]

}

}


/* THREE JS */

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(75,1,0.1,1000)

let renderer = new THREE.WebGLRenderer({alpha:true})

renderer.setSize(500,500)

document.getElementById("viewer").appendChild(renderer.domElement)

let light = new THREE.DirectionalLight(0xffffff,1)

light.position.set(0,0,10)

scene.add(light)

let material = new THREE.MeshStandardMaterial({
color:0xa100ff,
metalness:0.6,
roughness:0.3
})

let loader = new THREE.STLLoader()

let meshes=[]

function clearScene(){

meshes.forEach(m=>scene.remove(m))
meshes=[]

}


/* charger moteur */

function loadMotor(type){

clearScene()

if(!pieces[product]) return

if(!pieces[product][type]) return

pieces[product][type].forEach(file=>{

loader.load(file,function(geometry){

let mesh = new THREE.Mesh(geometry,material)

geometry.center()

scene.add(mesh)

meshes.push(mesh)

})

})

}


camera.position.z = 120

let controls = new THREE.OrbitControls(camera,renderer.domElement)


function animate(){

requestAnimationFrame(animate)

renderer.render(scene,camera)

}

animate()


/* couleur */

function setColor(color){

material.color.set(color)

}


/* panier */

function addToCart(){

let cart = JSON.parse(localStorage.getItem("cart")) || []

cart.push({

name:product,
color:material.color.getHexString()

})

localStorage.setItem("cart",JSON.stringify(cart))

alert("Ajouté au panier")

}


/* charger AM6 au début */

loadMotor("am6")

</script>

</body>
</html>

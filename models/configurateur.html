<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Configurateur 3D</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/STLLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>

<style>

.config-container{

padding-top:120px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

}

#viewer{

width:800px;
height:500px;

background:white;

border-radius:10px;

box-shadow:0 10px 30px rgba(0,0,0,0.2);

}

.controls{

margin-top:20px;
display:flex;
gap:20px;

}

</style>

</head>

<body>

<header>

<div class="nav-left">
<a href="index.html">Accueil</a>
<a href="index.html#produits">Produits</a>
<a href="panier.html">Panier</a>
</div>

<div class="logo">
<a href="index.html">
<img src="logo.png">
</a>
</div>

<div class="nav-right">
<a href="#">Connexion</a>
</div>

</header>


<div class="config-container">

<h1>Configurateur Cache Allumage</h1>

<div id="viewer"></div>

<div class="controls">

<label>Couleur Corps</label>
<input type="color" id="corpsColor" value="#000000">

<label>Couleur Logo</label>
<input type="color" id="logoColor" value="#ff0000">

<label>Couleur Contour</label>
<input type="color" id="contourColor" value="#ffffff">

</div>

<br>

<button onclick="addToCart('Cache Allumage personnalisé',30)">
Ajouter au panier (30€)
</button>

</div>


<script src="panier.js"></script>

<script>

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
800/500,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({antialias:true});

renderer.setSize(800,500);

document.getElementById("viewer").appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(0,0,10);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff,0.5);
scene.add(ambient);

camera.position.z = 100;

const controls = new THREE.OrbitControls(camera,renderer.domElement);

const loader = new THREE.STLLoader();

let corpsMesh;
let logoMesh;
let contourMesh;

loader.load("piece_corps.STL",function(geometry){

const material = new THREE.MeshStandardMaterial({color:0x000000});

corpsMesh = new THREE.Mesh(geometry,material);

scene.add(corpsMesh);

});


loader.load("piece_logo.STL",function(geometry){

const material = new THREE.MeshStandardMaterial({color:0xff0000});

logoMesh = new THREE.Mesh(geometry,material);

scene.add(logoMesh);

});


loader.load("piece_contour.STL",function(geometry){

const material = new THREE.MeshStandardMaterial({color:0xffffff});

contourMesh = new THREE.Mesh(geometry,material);

scene.add(contourMesh);

});



document.getElementById("corpsColor").addEventListener("input",function(){

if(corpsMesh){

corpsMesh.material.color.set(this.value);

}

});


document.getElementById("logoColor").addEventListener("input",function(){

if(logoMesh){

logoMesh.material.color.set(this.value);

}

});


document.getElementById("contourColor").addEventListener("input",function(){

if(contourMesh){

contourMesh.material.color.set(this.value);

}

});


function animate(){

requestAnimationFrame(animate);

controls.update();

renderer.render(scene,camera);

}

animate();

</script>

</body>

</html>

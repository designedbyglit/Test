<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>DesignedByGlit</title>

<style>

body{
margin:0;
background:#0a0a0a;
color:white;
font-family:Arial;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:black;
}

header a{
color:white;
text-decoration:none;
font-size:18px;
}

.logo{
font-size:24px;
color:#a100ff;
font-weight:bold;
}

/* TITRE */

.hero{
text-align:center;
font-size:32px;
margin-top:40px;
}

/* SEMI FULL */

.top-products{

display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
padding:60px;

}

.big-card{

background:#111;
border-radius:25px;
overflow:hidden;
text-align:center;
cursor:pointer;
transition:0.3s;
animation:float 4s ease-in-out infinite;

}

.big-card img{
width:100%;
height:320px;
object-fit:cover;
}

.big-card h2{
padding:20px;
}

.big-card:hover{
transform:scale(1.05);
box-shadow:0 0 30px #a100ff;
}

/* PRODUITS */

.products{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:40px;
padding:40px 60px;

}

.card{

background:#111;
border-radius:20px;
overflow:hidden;
text-align:center;
cursor:pointer;
transition:0.3s;
animation:float 4s ease-in-out infinite;

}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card h3{
padding:15px;
}

.card:hover{
transform:scale(1.08);
box-shadow:0 0 25px #a100ff;
}

/* FLOTTEMENT */

@keyframes float{

0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}

}

</style>

</head>

<body>

<header>

<a href="index.html">Accueil</a>

<div class="logo">DesignedByGlit</div>

<a href="panier.html">Panier</a>

</header>

<div class="hero">
Personnalise tes pièces moto 3D
</div>

<!-- SEMI / FULL -->

<section class="top-products">

<a class="big-card" href="semi-perso.html">
<img src="images/semiperso.png">
<h2>Semi Perso</h2>
</a>

<a class="big-card" href="fullperso.html">
<img src="images/fullperso.png">
<h2>Full Perso</h2>
</a>

</section>

<!-- PIECES -->

<section class="products">

<a class="card" href="configurateur.html?piece=cache_allumage">
<img src="images/allumage.png">
<h3>Cache Allumage</h3>
</a>

<a class="card" href="configurateur.html?piece=cache_pignon">
<img src="images/pignon.png">
<h3>Cache Pignon</h3>
</a>

<a class="card" href="configurateur.html?piece=support_durite">
<img src="images/support.png">
<h3>Support Durite</h3>
</a>

<a class="card" href="configurateur.html?piece=recuperateur">
<img src="images/recuperateur.png">
<h3>Récupérateur Fluides</h3>
</a>

<a class="card" href="configurateur.html?piece=obturateur">
<img src="images/obturateur.png">
<h3>Cache Obturateur</h3>
</a>

<a class="card" href="configurateur.html?piece=biellette">
<img src="images/biellette.png">
<h3>Butée Biellette</h3>
</a>

<a class="card" href="configurateur.html?piece=pipe">
<img src="images/pipe.png">
<h3>Pipe Performance</h3>
</a>

<a class="card" href="configurateur.html?piece=radia">
<img src="images/radia.png">
<h3>Adaptation Radia Derbi</h3>
</a>

</section>

</body>
</html>

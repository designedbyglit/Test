<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>DesignedByGlit</title>

<style>

body{
margin:0;
background:#0a0a0a;
color:white;
font-family:Arial;
}

/* HEADER */

header{

display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:black;

}

header a{

color:white;
text-decoration:none;
font-size:18px;

}

.logo{

font-size:24px;
color:#a100ff;
font-weight:bold;

}

/* PRODUITS */

.products{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:40px;
padding:60px;

}

.card{

background:#111;
border-radius:20px;
overflow:hidden;
cursor:pointer;
text-align:center;
transition:0.3s;
animation:float 4s ease-in-out infinite;

}

.card img{

width:100%;
height:220px;
object-fit:cover;

}

.card h3{

padding:10px;

}

.card:hover{

transform:scale(1.07);
box-shadow:0 0 25px #a100ff;

}

@keyframes float{

0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}

}

</style>

</head>

<body>

<header>

<a href="index.html">Accueil</a>

<div class="logo">DesignedByGlit</div>

<a href="panier.html">Panier</a>

</header>

<section class="products">

<a class="card" href="produit.html?piece=recuperateur">
<img src="images/recuperateur.png">
<h3>Récupérateur de fluides</h3>
</a>

<a class="card" href="produit.html?piece=support_durite">
<img src="images/support.png">
<h3>Support durite</h3>
</a>

<a class="card" href="produit.html?piece=cache_pignon">
<img src="images/pignon.png">
<h3>Cache pignon</h3>
</a>

<a class="card" href="produit.html?piece=cache_allumage">
<img src="images/allumage.png">
<h3>Cache allumage</h3>
</a>

<a class="card" href="produit.html?piece=obturateur">
<img src="images/obturateur.png">
<h3>Cache obturateur</h3>
</a>

<a class="card" href="produit.html?piece=biellette">
<img src="images/biellette.png">
<h3>Butée biellette</h3>
</a>

</section>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>DesignedByGlit</title>

<style>

body{
margin:0;
background:#0a0a0a;
font-family:Arial;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#000;
}

header a{
color:white;
text-decoration:none;
font-size:18px;
}

.logo{
font-size:24px;
color:#a100ff;
font-weight:bold;
}

/* PRODUITS */

.products{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:30px;
padding:40px;
}

.card{

background:#111;
border-radius:20px;
overflow:hidden;
text-align:center;
transition:0.3s;
cursor:pointer;
box-shadow:0 0 10px #a100ff44;

}

.card:hover{

transform:scale(1.05);
box-shadow:0 0 25px #a100ff;

}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h3{
padding:10px;
}

</style>

</head>

<body>

<header>

<a href="index.html">Accueil</a>

<div class="logo">DesignedByGlit</div>

<a href="panier.html">Panier</a>

</header>

<section class="products">

<a class="card" href="produit.html?piece=recuperateur">
<img src="images/recuperateur.png">
<h3>Récupérateur de fluides</h3>
</a>

<a class="card" href="produit.html?piece=support_durite">
<img src="images/support.png">
<h3>Support durite</h3>
</a>

<a class="card" href="produit.html?piece=cache_pignon">
<img src="images/pignon.png">
<h3>Cache pignon</h3>
</a>

<a class="card" href="produit.html?piece=cache_allumage">
<img src="images/allumage.png">
<h3>Cache allumage</h3>
</a>

<a class="card" href="produit.html?piece=obturateur">
<img src="images/obturateur.png">
<h3>Cache obturateur</h3>
</a>

<a class="card" href="produit.html?piece=biellette">
<img src="images/biellette.png">
<h3>Butée biellette</h3>
</a>

</section>

</body>
</html>

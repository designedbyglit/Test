<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Panier</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;
}

a{
color:#a100ff;
}

</style>

</head>

<body>

<a href="index.html">← Retour accueil</a>

<h1>Panier</h1>

<div id="cart"></div>

<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[]

let div=document.getElementById("cart")

cart.forEach(item=>{

let p=document.createElement("p")

p.innerText=item.name

div.appendChild(p)

})

</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Panier</title>

<style>

body{

background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;

}

header{

display:flex;
justify-content:space-between;
padding:20px;
background:black;

}

a{

color:white;
text-decoration:none;

}

</style>

</head>

<body>

<header>

<a href="index.html">Accueil</a>

<div>Panier</div>

</header>

<h1>Panier</h1>

<div id="cart"></div>

<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[]

let div=document.getElementById("cart")

cart.forEach(item=>{

let p=document.createElement("p")

p.innerText=item.name

div.appendChild(p)

})

</script>

</body>
</html>

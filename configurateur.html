<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Configurateur</title>

<style>

body{
margin:0;
background:#0a0a0a;
color:white;
font-family:Arial;
}

header{
display:flex;
justify-content:space-between;
padding:20px;
background:black;
}

#viewer{
width:100%;
height:500px;
}

.controls{
padding:20px;
text-align:center;
}

button{

background:#a100ff;
border:none;
padding:10px 15px;
margin:5px;
color:white;
border-radius:10px;
cursor:pointer;

}

select{
padding:8px;
margin:10px;
}

</style>
</head>

<body>

<header>

<a href="index.html">Accueil</a>

<div>Configurateur</div>

<a href="panier.html">Panier</a>

</header>

<div id="viewer"></div>

<div class="controls">

<label>Type moteur :</label>

<select id="moteur" onchange="loadPiece()">
<option value="am6">AM6</option>
<option value="e3">€3</option>
</select>

<br><br>

<button onclick="setColor('#000000')">Noir</button>
<button onclick="setColor('#ffffff')">Blanc</button>
<button onclick="setColor('#ff0000')">Rouge</button>
<button onclick="setColor('#0000ff')">Bleu</button>
<button onclick="setColor('#a100ff')">Violet</button>
<button onclick="setColor('#ff7b00')">Orange</button>

<br><br>

<button onclick="addToCart()">Ajouter au panier</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/STLLoader.js"></script>

<script src="js/viewer.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Configurateur 3D</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/STLLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

</head>

<body>

<header>

<div class="nav-left">
<a href="index.html">Accueil</a>
<a href="#">Produits</a>
<a href="#">Panier</a>
</div>

<div class="logo">
<img src="images/logo.png">
</div>

<div class="nav-right">
<a href="#">Compte</a>
</div>

</header>


<section style="padding:100px;text-align:center">

<h1>Configurateur 3D</h1>

<div id="viewer" style="width:800px;height:500px;margin:auto"></div>

<br>

<label>Couleur :</label>

<input type="color" id="colorPicker" value="#a100ff">

<br><br>

<button onclick="addToCart()">Ajouter au panier</button>

</section>


<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
800/500,
0.1,
1000
)

const renderer = new THREE.WebGLRenderer({antialias:true})

renderer.setSize(800,500)

document.getElementById("viewer").appendChild(renderer.domElement)

const controls = new THREE.OrbitControls(camera,renderer.domElement)


const light1 = new THREE.PointLight(0xffffff,1)

light1.position.set(5,5,5)

scene.add(light1)

const light2 = new THREE.AmbientLight(0xffffff,0.6)

scene.add(light2)


let piece

const loader = new THREE.STLLoader()

loader.load(

"models/piece_corps.STL",

function(geometry){

const material = new THREE.MeshStandardMaterial({

color:0xa100ff,

metalness:0.3,

roughness:0.4

})

piece = new THREE.Mesh(geometry,material)

geometry.center()

scene.add(piece)

}

)


camera.position.z = 120


function animate(){

requestAnimationFrame(animate)

if(piece){

piece.rotation.y += 0.01

}

renderer.render(scene,camera)

}

animate()


/* CHANGER COULEUR */

document.getElementById("colorPicker").addEventListener("input",function(){

if(piece){

piece.material.color.set(this.value)

}

})


/* AJOUT PANIER */

function addToCart(){

let cart = JSON.parse(localStorage.getItem("cart")) || []

cart.push({

name:"Pièce personnalisée",

price:30

})

localStorage.setItem("cart",JSON.stringify(cart))

alert("Produit ajouté au panier")

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Configurateur</title>

<style>

body{
margin:0;
background:#0a0a0a;
color:white;
font-family:Arial;
}

header{
display:flex;
justify-content:space-between;
padding:20px;
background:black;
}

#viewer{
width:100%;
height:500px;
}

.controls{
text-align:center;
padding:20px;
}

button{

background:#a100ff;
border:none;
padding:10px 20px;
margin:5px;
color:white;
border-radius:10px;
cursor:pointer;

}

</style>

</head>

<body>

<header>

<a href="index.html">Accueil</a>

<div>Configurateur</div>

<a href="panier.html">Panier</a>

</header>

<div id="viewer"></div>

<div class="controls">

<button onclick="setColor('#ff0000')">Rouge</button>
<button onclick="setColor('#00ff00')">Vert</button>
<button onclick="setColor('#0000ff')">Bleu</button>
<button onclick="setColor('#ffffff')">Blanc</button>
<button onclick="setColor('#000000')">Noir</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/STLLoader.js"></script>

<script>

const params = new URLSearchParams(window.location.search)
const piece = params.get("piece")

let stl = ""

if(piece=="recuperateur"){
stl="models/recup_e3_base.stl"
}

if(piece=="support_durite"){
stl="models/support_e3.stl"
}

if(piece=="cache_pignon"){
stl="models/pignon_e3_base.stl"
}

if(piece=="cache_allumage"){
stl="models/cache_e3_base.stl"
}

if(piece=="obturateur"){
stl="models/obturateur_e3_base.stl"
}

if(piece=="biellette"){
stl="models/biellette.stl"
}

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/500,
0.1,
1000
)

let renderer = new THREE.WebGLRenderer({antialias:true})

renderer.setSize(window.innerWidth,500)

document.getElementById("viewer").appendChild(renderer.domElement)

camera.position.z=100

let light = new THREE.DirectionalLight(0xffffff,1)

light.position.set(0,1,1)

scene.add(light)

let mesh

let loader = new THREE.STLLoader()

loader.load(stl,function(geometry){

let material = new THREE.MeshStandardMaterial({color:0xa100ff})

mesh = new THREE.Mesh(geometry,material)

geometry.center()

scene.add(mesh)

})

function animate(){

requestAnimationFrame(animate)

if(mesh){
mesh.rotation.y +=0.01
}

renderer.render(scene,camera)

}

animate()

function setColor(color){

mesh.material.color.set(color)

}

</script>

</body>
</html>
